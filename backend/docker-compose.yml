version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stellar-postgres
    environment:
      POSTGRES_USER: stellar
      POSTGRES_PASSWORD: stellar_dev_password
      POSTGRES_DB: stellar_db
    ports:
      - "5432:5432"
    volumes:
      - stellar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellar"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stellar-redis
    ports:
      - "6379:6379"
    volumes:
      - stellar_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: rust:1.81-slim
    container_name: stellar-api
    working_dir: /app
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
    ports:
      - "3001:3001"
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "3001"
      DATABASE_URL: "postgres://stellar:stellar_dev_password@postgres:5432/stellar_db"
      RUST_LOG: "info,stellar_api=debug"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: cargo run --bin stellar-api

  indexer:
    image: rust:1.81-slim
    container_name: stellar-indexer
    working_dir: /app
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
    environment:
      DATABASE_URL: "postgres://stellar:stellar_dev_password@postgres:5432/stellar_db"
      STELLAR_NETWORK: "testnet"
      STELLAR_RPC_URL: "https://soroban-testnet.stellar.org"
      RUST_LOG: "info,stellar_indexer=debug"
      INDEXER_PORT: "3002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    command: cargo run --bin stellar-indexer

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stellar-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stellar.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  stellar_postgres_data:
  stellar_redis_data:
  cargo_cache:

networks:
  default:
    name: stellar_network
