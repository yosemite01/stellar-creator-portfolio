version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: stellar-postgres
    environment:
      POSTGRES_USER: stellar
      POSTGRES_PASSWORD: stellar_dev_password
      POSTGRES_DB: stellar_db
    ports:
      - "5432:5432"
    volumes:
      - stellar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: stellar-api
    ports:
      - "3001:3001"
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "3001"
      DATABASE_URL: "postgres://stellar:stellar_dev_password@postgres:5432/stellar_db"
      RUST_LOG: "info,stellar_api=debug"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/api/src:/app/src
    command: cargo run --bin stellar-api
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Auth Service
  auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    container_name: stellar-auth
    ports:
      - "3002:3002"
    environment:
      AUTH_HOST: "0.0.0.0"
      AUTH_PORT: "3002"
      JWT_SECRET: "dev-jwt-secret-change-in-production"
      RUST_LOG: "info,stellar_auth=debug"
    volumes:
      - ./services/auth/src:/app/src
    command: cargo run --bin stellar-auth
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3002/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Notifications Service
  notifications:
    build:
      context: .
      dockerfile: Dockerfile.notifications
    container_name: stellar-notifications
    ports:
      - "3003:3003"
    environment:
      NOTIFICATIONS_HOST: "0.0.0.0"
      NOTIFICATIONS_PORT: "3003"
      RUST_LOG: "info,stellar_notifications=debug"
    volumes:
      - ./services/notifications/src:/app/src
    command: cargo run --bin stellar-notifications
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3003/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Blockchain Indexer
  indexer:
    build:
      context: .
      dockerfile: Dockerfile.indexer
    container_name: stellar-indexer
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: "postgres://stellar:stellar_dev_password@postgres:5432/stellar_db"
      STELLAR_NETWORK: "testnet"
      INDEXER_HOST: "0.0.0.0"
      INDEXER_PORT: "9000"
      RUST_LOG: "info,stellar_indexer=debug"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/indexer/src:/app/src
    command: cargo run --bin stellar-indexer
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: stellar-redis
    ports:
      - "6379:6379"
    volumes:
      - stellar_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin for Database Management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stellar-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stellar.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  stellar_postgres_data:
  stellar_redis_data:

networks:
  default:
    name: stellar_network
