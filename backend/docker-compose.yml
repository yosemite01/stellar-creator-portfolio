version: '3.8'

services:
  consul:
    image: hashicorp/consul:1.17
    container_name: stellar-consul
    ports:
      - "8500:8500"     # HTTP API + UI
      - "8600:8600/udp" # DNS
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    volumes:
      - stellar_consul_data:/consul/data
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: stellar-postgres
    environment:
      POSTGRES_USER: stellar
      POSTGRES_PASSWORD: stellar_dev_password
      POSTGRES_DB: stellar_db
    ports:
      - "5432:5432"
    volumes:
      - stellar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellar"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stellar-redis
    ports:
      - "6379:6379"
    volumes:
      - stellar_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: stellar-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC collector
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  api:
    image: rust:1.81-slim
    container_name: stellar-api
    working_dir: /app
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
    ports:
      - "3001:3001"
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "3001"
      DATABASE_URL: "postgres://stellar:stellar_dev_password@postgres:5432/stellar_db"
      REDIS_URL: "redis://redis:6379"
      CONSUL_HTTP_ADDR: "http://consul:8500"
      RUST_LOG: "info,stellar_api=debug"
      OTLP_ENDPOINT: "http://jaeger:4317"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
      jaeger:
        condition: service_started
    command: cargo run --bin stellar-api
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  indexer:
    image: rust:1.81-slim
    container_name: stellar-indexer
    working_dir: /app
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
    environment:
      DATABASE_URL: "postgres://stellar:stellar_dev_password@postgres:5432/stellar_db"
      STELLAR_NETWORK: "testnet"
      STELLAR_RPC_URL: "https://soroban-testnet.stellar.org"
      CONSUL_HTTP_ADDR: "http://consul:8500"
      RUST_LOG: "info,stellar_indexer=debug"
      OTLP_ENDPOINT: "http://jaeger:4317"
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
      jaeger:
        condition: service_started
    command: cargo run --bin stellar-indexer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h postgres -U stellar -d stellar_db || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

    # ── Notifications Service ────────────────────────────────────────────────
  # Redis-based message queue for reliable notification delivery.
  # Supports email, in-app, push, webhook, and SMS notifications.
  notifications:
    image: rust:1.81-slim
    container_name: stellar-notifications
    working_dir: /app
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
    ports:
      - "3003:3003"
    environment:
      NOTIFICATIONS_HOST: "0.0.0.0"
      NOTIFICATIONS_PORT: "3003"
      REDIS_URL: "redis://redis:6379"
      MAX_RETRIES: "3"
      RETRY_DELAY_SECONDS: "60"
      WORKER_POLL_INTERVAL_SECONDS: "5"
      # SMTP Configuration (optional - for email notifications)
      SMTP_HOST: "${SMTP_HOST:-smtp.gmail.com}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM_ADDRESS: "${SMTP_FROM_ADDRESS:-notifications@stellar.local}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-Stellar Platform}"
      # Webhook Configuration (optional)
      WEBHOOK_BASE_URL: "${WEBHOOK_BASE_URL:-}"
      RUST_LOG: "info,stellar_notifications=debug"
    depends_on:
      redis:
        condition: service_healthy
    command: cargo run --bin stellar-notifications
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stellar-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stellar.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # ── Backup service ───────────────────────────────────────────────────────
  # Runs pg_dump on a cron schedule and uploads to S3 (or S3-compatible store).
  # Set BACKUP_SCHEDULE (cron syntax) and AWS_* vars in your .env file.
  # Retention is managed by S3 lifecycle rules on the target bucket.
  db-backup:
    image: eeshugerman/postgres-backup-s3:16
    container_name: stellar-db-backup
    environment:
      SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}        # default: daily at 02:00 UTC
      S3_REGION: ${AWS_REGION}
      S3_BUCKET: ${BACKUP_S3_BUCKET}
      S3_PREFIX: ${BACKUP_S3_PREFIX:-stellar/postgres}
      S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}           # leave empty for AWS S3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: stellar_db
      POSTGRES_USER: stellar
      POSTGRES_PASSWORD: stellar_dev_password
      POSTGRES_EXTRA_OPTS: --compress=9 --clean --if-exists
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  stellar_consul_data:
  stellar_postgres_data:
  stellar_redis_data:
  cargo_cache:

networks:
  default:
    name: stellar_network
