[workspace]
members = [
    "contracts/bounty",
    "contracts/escrow",
    "contracts/freelancer",
    "contracts/governance",
    "services/api",
    "services/auth",
    "services/notifications",
    "services/indexer",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.81.0"
authors = ["Stellar Team"]
license = "MIT"
repository = "https://github.com/stellar/stellar-platform"

[workspace.dependencies]
# Soroban SDK
soroban-sdk = { version = "23.5.2" }

# Web & HTTP
actix-web = "4.4"
actix-rt = "2.9"
tokio = { version = "1.35", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio-native-tls", "postgres", "macros", "uuid", "chrono", "rust_decimal"] }

# Additional types
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
rust_decimal = { version = "1.33", features = ["db-postgres"] }

# Cryptography
ed25519-dalek = "2.1"
sha2 = { version = "0.10", features = ["std"] }
hex = "0.4"

# JWT
jsonwebtoken = "9.3"

# Password hashing
argon2 = "0.5"

# Utilities
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1.0"
futures = "0.3"
dotenvy = "0.15"

# Testing
tokio-test = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

# Contract-optimised release profile (used when building WASM)
[profile.release-contract]
inherits = "release"
opt-level = "z"
strip = true
