replicaCount: 2

image:
  repository: ghcr.io/tukura11/stellar-next-app
  pullPolicy: IfNotPresent
  tag: ""

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

config:
  NODE_ENV: "production"
  PORT: "3000"

secrets:
  awsSecretName: stellar/next-app

livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /ready
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10

pdb:
  minAvailable: 1
