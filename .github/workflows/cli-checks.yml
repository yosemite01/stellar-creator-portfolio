name: CLI checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cli-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Run frontend Orbit-style lint
        run: pnpm run frontend:orbit-check

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Run backend clippy
        run: pnpm run backend:clippy

      - name: Run smart contract clippy
        run: pnpm run smart-contract:clippy

      - name: Run combined CLI checks
        run: pnpm run cli-checks
