version: 2

updates:
  # ── Root (Next.js app) ────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "playwright"
          - "@playwright/*"
      nextjs:
        patterns:
          - "next"
          - "@next/*"
      radix-ui:
        patterns:
          - "@radix-ui/*"
    ignore:
      # Pin major versions — review manually
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]

  # ── Frontend ──────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      stellar-sdk:
        patterns:
          - "@stellar/*"
          - "stellar-sdk"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "jest"
          - "@jest/*"

  # ── Mobile ────────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
      - "mobile"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      react-native:
        patterns:
          - "react-native"
          - "@react-native/*"
          - "react-native-*"
      expo:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"

  # ── Backend (Rust) ────────────────────────────────────────────────────────
  - package-ecosystem: "cargo"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      tokio:
        patterns:
          - "tokio"
          - "tokio-*"
      axum:
        patterns:
          - "axum"
          - "axum-*"
      opentelemetry:
        patterns:
          - "opentelemetry"
          - "opentelemetry-*"

  # ── Contracts (Soroban/Rust) ──────────────────────────────────────────────
  - package-ecosystem: "cargo"
    directory: "/contracts"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
      - "contracts"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
